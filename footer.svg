<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 140" width="900" height="140">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#080f1a"/>
      <stop offset="50%"  stop-color="#110820"/>
      <stop offset="100%" stop-color="#0a0a18"/>
    </linearGradient>
    <linearGradient id="energyH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="80%"  stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="energyV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="orbP" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbC" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="gP" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gText" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="140"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="900" height="140" fill="url(#bg)"/>

    <!-- Diagonal lines -->
    <line x1="0"   y1="0"   x2="105" y2="140" stroke="#A78BFA" stroke-width="0.5" stroke-opacity="0.07"/>
    <line x1="900" y1="0"   x2="795" y2="140" stroke="#67E8F9" stroke-width="0.5" stroke-opacity="0.07"/>

    <!-- Orbs -->
    <ellipse cx="75"  cy="110" rx="110" ry="90" fill="url(#orbP)">
      <animate attributeName="rx" values="110;132;110" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="825" cy="35"  rx="110" ry="90" fill="url(#orbC)">
      <animate attributeName="rx" values="110;135;110" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="450" cy="70"  rx="180" ry="60" fill="url(#orbP)" opacity="0.3">
      <animate attributeName="rx" values="180;210;180" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0.45;0.25" dur="12s" repeatCount="indefinite"/>
    </ellipse>

    <!-- Energy lines -->
    <rect x="0" y="0"   width="900" height="1.5" fill="url(#energyH)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="138" width="900" height="1.5" fill="url(#energyH)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="0"   y="0" width="1.5" height="140" fill="url(#energyV)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="898" y="0" width="1.5" height="140" fill="url(#energyV)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Expanding ring from center (same language) -->
    <circle cx="450" cy="70" r="0" fill="none" stroke="#A78BFA" stroke-width="0.8">
      <animate attributeName="r"       values="0;200"  dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="70" r="0" fill="none" stroke="#67E8F9" stroke-width="0.6">
      <animate attributeName="r"       values="0;200"  dur="5s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0"  dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- Particles — purple -->
    <g filter="url(#gP)">
      <circle cx="180" cy="120" r="2.5" fill="#A78BFA">
        <animate attributeName="cy"      values="120;104;120"  dur="4.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9"  dur="4.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="720" cy="18"  r="2"   fill="#C4B5FD">
        <animate attributeName="cy"      values="18;5;18"      dur="5.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.15;0.8" dur="5.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="450" cy="130" r="3"   fill="#A78BFA">
        <animate attributeName="cy"      values="130;114;130"  dur="5.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.25;1"     dur="5.7s" repeatCount="indefinite"/>
        <animate attributeName="r"       values="3;4;3"        dur="5.7s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Particles — cyan -->
    <g filter="url(#gC)">
      <circle cx="320" cy="14"  r="2.5" fill="#67E8F9">
        <animate attributeName="cy"      values="14;3;14"      dur="4.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9"  dur="4.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="130" r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="130;116;130"  dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.15;0.8" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="840" cy="90"  r="2.5" fill="#22D3EE">
        <animate attributeName="cx"      values="840;825;840"  dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.12;0.7" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="60"  cy="50"  r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="50;37;50"     dur="3.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0.15;0.75" dur="3.9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Quote line 1 — purple -->
    <text x="450" y="46"
      font-family="'Fira Code','Courier New',monospace"
      font-size="12.5" fill="#A78BFA" fill-opacity="0.90"
      text-anchor="middle" letter-spacing="0.3"
      filter="url(#gText)">
      💡 "Innovation is born from the passion to learn...
    </text>
    <!-- Quote line 2 — cyan -->
    <text x="450" y="65"
      font-family="'Fira Code','Courier New',monospace"
      font-size="12.5" fill="#67E8F9" fill-opacity="0.85"
      text-anchor="middle" letter-spacing="0.3">
      ...and the desire to improve the world, one project at a time."
    </text>

    <!-- Separator dots -->
    <circle cx="434" cy="82" r="1.8" fill="#A78BFA" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="82" r="1.8" fill="#67E8F9" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="466" cy="82" r="1.8" fill="#A78BFA" opacity="0.5">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" begin="1.2s" repeatCount="indefinite"/>
    </circle>

    <!-- Badge — no date -->
    <rect x="320" y="96" width="260" height="28" rx="6"
      fill="#0a0a18" fill-opacity="0.85" stroke="#7C3AED" stroke-width="1.2"/>
    <text x="450" y="115"
      font-family="'Fira Code',monospace"
      font-size="11.5" fill="#C4B5FD" text-anchor="middle">
      ❤️  Made by Samuel David  ·  UNAL
    </text>
  </g>
</svg>
