<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 200" width="900" height="200">
  <defs>
    <linearGradient id="bgR" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="50%"  stop-color="#130820"/>
      <stop offset="100%" stop-color="#091520"/>
    </linearGradient>
    <linearGradient id="lineR" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#A78BFA"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="75%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="gpR">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gcR">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowR">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="frameR"><rect width="900" height="200"/></clipPath>
  </defs>

  <g clip-path="url(#frameR)">
    <rect width="900" height="200" fill="url(#bgR)"/>

    <!-- Grid -->
    <g stroke="#A78BFA" stroke-opacity="0.035" stroke-width="1">
      <line x1="0"   y1="50"  x2="900" y2="50"/>
      <line x1="0"   y1="100" x2="900" y2="100"/>
      <line x1="0"   y1="150" x2="900" y2="150"/>
      <line x1="180" y1="0"   x2="180" y2="200"/>
      <line x1="360" y1="0"   x2="360" y2="200"/>
      <line x1="540" y1="0"   x2="540" y2="200"/>
      <line x1="720" y1="0"   x2="720" y2="200"/>
    </g>

    <!-- Orbs -->
    <circle cx="80"  cy="50"  r="70" fill="#7C3AED" opacity="0.10">
      <animate attributeName="r"       values="70;85;70"       dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.16;0.10" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="150" r="75" fill="#7C3AED" opacity="0.09">
      <animate attributeName="r"       values="75;90;75"       dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.09;0.14;0.09" dur="9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="820" cy="40"  r="55" fill="#22D3EE" opacity="0.09">
      <animate attributeName="r"       values="55;68;55"       dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.09;0.14;0.09" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70"  cy="165" r="50" fill="#22D3EE" opacity="0.08">
      <animate attributeName="r"       values="50;62;50"       dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.13;0.08" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Purple particles -->
    <g filter="url(#gpR)">
      <circle cx="200" cy="25"  r="2.5" fill="#A78BFA">
        <animate attributeName="cy"      values="25;10;25"     dur="4s"   repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.25;0.9" dur="4s"   repeatCount="indefinite"/>
      </circle>
      <circle cx="700" cy="175" r="2"   fill="#A78BFA">
        <animate attributeName="cy"      values="175;160;175"  dur="5s"   repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="5s"   repeatCount="indefinite"/>
      </circle>
      <circle cx="450" cy="18"  r="3"   fill="#C4B5FD">
        <animate attributeName="cy"      values="18;5;18"      dur="6s"   repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1"      dur="6s"   repeatCount="indefinite"/>
      </circle>
      <circle cx="855" cy="100" r="2"   fill="#A78BFA">
        <animate attributeName="cx"      values="855;840;855"  dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7"  dur="4.5s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Cyan particles -->
    <g filter="url(#gcR)">
      <circle cx="340" cy="178" r="2.5" fill="#67E8F9">
        <animate attributeName="cy"      values="178;163;178"  dur="4s"   repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.3;0.9"  dur="4s"   repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="20"  r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="20;7;20"      dur="5.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.25;0.8" dur="5.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="760" cy="55"  r="3"   fill="#22D3EE">
        <animate attributeName="cy"      values="55;40;55"     dur="3.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="3.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="145" cy="145" r="2"   fill="#67E8F9">
        <animate attributeName="cx"      values="145;160;145"  dur="5s"   repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7"  dur="5s"   repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Accent lines -->
    <rect x="0" y="0"   width="900" height="2.5" fill="url(#lineR)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="197" width="900" height="2.5" fill="url(#lineR)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Corner tag — top left -->
    <rect x="12" y="10" width="120" height="20" rx="4" fill="#7C3AED" fill-opacity="0.18" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.5"/>
    <text x="72" y="24" font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD" text-anchor="middle">samsanchezcar</text>

    <!-- Corner tag — top right -->
    <rect x="768" y="10" width="120" height="20" rx="4" fill="#0891B2" fill-opacity="0.15" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.5"/>
    <text x="828" y="24" font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9" text-anchor="middle">UNAL · 2025</text>

    <!-- Main title area — placeholder bar for repo name -->
    <!-- Decorative bracket left -->
    <text x="80" y="100"
      font-family="'Fira Code',monospace"
      font-size="42" fill="#7C3AED" fill-opacity="0.35"
      text-anchor="middle">&lt;</text>

    <!-- Decorative bracket right -->
    <text x="820" y="100"
      font-family="'Fira Code',monospace"
      font-size="42" fill="#67E8F9" fill-opacity="0.35"
      text-anchor="middle">/&gt;</text>

    <!-- Pulsing dot trio — center decorative element -->
    <circle cx="432" cy="82" r="4" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" repeatCount="indefinite"/>
      <animate attributeName="r"       values="4;5.5;4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="82" r="4" fill="#67E8F9">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
      <animate attributeName="r"       values="4;5.5;4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="468" cy="82" r="4" fill="#A78BFA">
      <animate attributeName="opacity" values="1;0.3;1" dur="1.5s" begin="1.0s" repeatCount="indefinite"/>
      <animate attributeName="r"       values="4;5.5;4" dur="1.5s" begin="1.0s" repeatCount="indefinite"/>
    </circle>

    <!-- Subtitle line — repo context -->
    <text x="450" y="118"
      font-family="'Fira Code','Courier New',monospace"
      font-size="13" fill="#A78BFA" fill-opacity="0.85"
      text-anchor="middle" letter-spacing="0.5"
      filter="url(#glowR)">
      Mechatronics Engineering  ·  UNAL  ·  Bogotá, Colombia
      <animate attributeName="opacity" values="0;1" dur="1s" begin="0.4s" fill="freeze"/>
    </text>

    <!-- Tech chips row -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.6s" fill="freeze"/>
      <rect x="233" y="140" width="80" height="22" rx="11" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="273" y="155" font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD" text-anchor="middle">🤖 Robotics</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="0.8s" fill="freeze"/>
      <rect x="323" y="140" width="88" height="22" rx="11" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.6"/>
      <text x="367" y="155" font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9" text-anchor="middle">🖥️ Embedded</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.0s" fill="freeze"/>
      <rect x="421" y="140" width="72" height="22" rx="11" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="457" y="155" font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD" text-anchor="middle">📐 CAD</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.2s" fill="freeze"/>
      <rect x="503" y="140" width="72" height="22" rx="11" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.6"/>
      <text x="539" y="155" font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9" text-anchor="middle">🧠 AI/RL</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.4s" fill="freeze"/>
      <rect x="585" y="140" width="82" height="22" rx="11" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="626" y="155" font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD" text-anchor="middle">⚙️ Control</text>
    </g>

  </g>
</svg>
