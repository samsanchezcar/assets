<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="skBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#130820"/>
    </linearGradient>
    <linearGradient id="barP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="barC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="barM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="gpSk">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="skClip"><rect width="900" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#skClip)">
    <rect width="900" height="320" fill="url(#skBg)"/>

    <!-- Faint grid -->
    <g stroke="#A78BFA" stroke-opacity="0.03" stroke-width="1">
      <line x1="0"   y1="80"  x2="900" y2="80"/>
      <line x1="0"   y1="160" x2="900" y2="160"/>
      <line x1="0"   y1="240" x2="900" y2="240"/>
      <line x1="450" y1="0"   x2="450" y2="320"/>
    </g>

    <!-- Background particles -->
    <g filter="url(#gpSk)">
      <circle cx="60"  cy="60"  r="2" fill="#A78BFA" opacity="0.6">
        <animate attributeName="cy" values="60;44;60" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="840" cy="260" r="2" fill="#67E8F9" opacity="0.6">
        <animate attributeName="cy" values="260;244;260" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="450" cy="15"  r="2.5" fill="#C4B5FD" opacity="0.7">
        <animate attributeName="cy" values="15;2;15" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Section title -->
    <text x="450" y="38"
      font-family="'Segoe UI',Arial,sans-serif"
      font-size="18" font-weight="700"
      fill="#E0D7FF" text-anchor="middle" letter-spacing="2">
      🛠️  TECH  STACK
    </text>
    <line x1="330" y1="46" x2="570" y2="46" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.5"/>

    <!-- ── LEFT: Skill bars ── -->
    <!-- Labels -->
    <text x="32" y="80"  font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA">C / C++</text>
    <text x="32" y="112" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA">Python</text>
    <text x="32" y="144" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9">ROS 2</text>
    <text x="32" y="176" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9">MATLAB</text>
    <text x="32" y="208" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA">ANSYS</text>
    <text x="32" y="240" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9">ESP32</text>
    <text x="32" y="272" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA">Git</text>

    <!-- Tracks -->
    <g fill="#1a1a2e" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1">
      <rect x="100" y="67" width="280" height="14" rx="7"/>
      <rect x="100" y="99" width="280" height="14" rx="7"/>
      <rect x="100" y="131" width="280" height="14" rx="7"/>
      <rect x="100" y="163" width="280" height="14" rx="7"/>
      <rect x="100" y="195" width="280" height="14" rx="7"/>
      <rect x="100" y="227" width="280" height="14" rx="7"/>
      <rect x="100" y="259" width="280" height="14" rx="7"/>
    </g>

    <!-- Animated fills -->
    <rect x="100" y="67"  width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;246" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="99"  width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;238" dur="1.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="131" width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;224" dur="1.2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="163" width="0" height="14" rx="7" fill="url(#barM)">
      <animate attributeName="width" values="0;252" dur="1.2s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="195" width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;202" dur="1.2s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="227" width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;230" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="259" width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;258" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- % labels -->
    <g font-family="'Fira Code',monospace" font-size="10" fill="#DDD6FE">
      <text x="354" y="78">88%</text>
      <text x="346" y="110">85%</text>
      <text x="332" y="142">80%</text>
      <text x="360" y="174">90%</text>
      <text x="310" y="206">72%</text>
      <text x="338" y="238">82%</text>
      <text x="366" y="270">92%</text>
    </g>

    <!-- Vertical separator -->
    <line x1="460" y1="58" x2="460" y2="295" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- ── RIGHT: Category chips ── -->

    <text x="490" y="80"  font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">💻 LANGUAGES</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="88" width="48" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="514" y="101" text-anchor="middle">C++</text>
      <rect x="546" y="88" width="58" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="575" y="101" text-anchor="middle">Python</text>
      <rect x="612" y="88" width="52" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="638" y="101" text-anchor="middle">MATLAB</text>
      <rect x="672" y="88" width="40" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="692" y="101" text-anchor="middle">Julia</text>
    </g>

    <text x="490" y="134" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9" font-weight="600">🤖 ROBOTICS</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9">
      <rect x="490" y="142" width="52" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="516" y="155" text-anchor="middle">ROS 2</text>
      <rect x="550" y="142" width="66" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="583" y="155" text-anchor="middle">MoveIt 2</text>
      <rect x="624" y="142" width="44" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="646" y="155" text-anchor="middle">URDF</text>
      <rect x="676" y="142" width="36" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="694" y="155" text-anchor="middle">HIL</text>
    </g>

    <text x="490" y="188" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">🖥️ EMBEDDED</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="196" width="50" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="515" y="209" text-anchor="middle">ESP32</text>
      <rect x="548" y="196" width="50" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="573" y="209" text-anchor="middle">FPGA</text>
      <rect x="606" y="196" width="60" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="636" y="209" text-anchor="middle">Arduino</text>
      <rect x="674" y="196" width="46" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="697" y="209" text-anchor="middle">RPi</text>
    </g>

    <text x="490" y="242" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9" font-weight="600">📐 CAD &amp; SIM</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9">
      <rect x="490" y="250" width="84" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="532" y="263" text-anchor="middle">Fusion 360</text>
      <rect x="582" y="250" width="56" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="610" y="263" text-anchor="middle">ANSYS</text>
      <rect x="646" y="250" width="82" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="687" y="263" text-anchor="middle">AutoCAD</text>
    </g>

    <text x="490" y="296" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">⚙️ CONTROL</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="300" width="74" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="527" y="313" text-anchor="middle">Simulink</text>
      <rect x="572" y="300" width="76" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="610" y="313" text-anchor="middle">Studio 5000</text>
      <rect x="656" y="300" width="38" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="675" y="313" text-anchor="middle">PID</text>
    </g>
  </g>
</svg>
