<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320" width="900" height="320">
  <defs>
    <linearGradient id="skBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="100%" stop-color="#130820"/>
    </linearGradient>
    <linearGradient id="barP" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="barC" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#0891B2"/>
      <stop offset="100%" stop-color="#67E8F9"/>
    </linearGradient>
    <linearGradient id="barM" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <filter id="gpSk">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="skClip"><rect width="900" height="320"/></clipPath>
  </defs>

  <g clip-path="url(#skClip)">
    <rect width="900" height="320" fill="url(#skBg)"/>

    <!-- Grid -->
    <g stroke="#A78BFA" stroke-opacity="0.03" stroke-width="1">
      <line x1="0"   y1="80"  x2="900" y2="80"/>
      <line x1="0"   y1="160" x2="900" y2="160"/>
      <line x1="0"   y1="240" x2="900" y2="240"/>
      <line x1="450" y1="0"   x2="450" y2="320"/>
    </g>

    <!-- Particles -->
    <g filter="url(#gpSk)">
      <circle cx="60"  cy="60"  r="2" fill="#A78BFA" opacity="0.6">
        <animate attributeName="cy" values="60;44;60" dur="5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="840" cy="260" r="2" fill="#67E8F9" opacity="0.6">
        <animate attributeName="cy" values="260;244;260" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="450" cy="15"  r="2.5" fill="#C4B5FD" opacity="0.7">
        <animate attributeName="cy" values="15;2;15" dur="6s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Section title -->
    <text x="450" y="36"
      font-family="'Segoe UI',Arial,sans-serif"
      font-size="18" font-weight="700"
      fill="#E0D7FF" text-anchor="middle" letter-spacing="2">
      🛠️  TECH  STACK
    </text>
    <line x1="330" y1="44" x2="570" y2="44" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.5"/>

    <!-- Labels -->
    <g font-family="'Fira Code',monospace" font-size="11">
      <text x="32" y="78"  fill="#A78BFA">C / C++</text>
      <text x="32" y="110" fill="#A78BFA">Python</text>
      <text x="32" y="142" fill="#67E8F9">ROS 2</text>
      <text x="32" y="174" fill="#67E8F9">MATLAB</text>
      <text x="32" y="206" fill="#A78BFA">ANSYS</text>
      <text x="32" y="238" fill="#67E8F9">ESP32</text>
      <text x="32" y="270" fill="#A78BFA">Git</text>
    </g>

    <!-- Bar tracks -->
    <g fill="#1a1a2e" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1">
      <rect x="100" y="65"  width="280" height="14" rx="7"/>
      <rect x="100" y="97"  width="280" height="14" rx="7"/>
      <rect x="100" y="129" width="280" height="14" rx="7"/>
      <rect x="100" y="161" width="280" height="14" rx="7"/>
      <rect x="100" y="193" width="280" height="14" rx="7"/>
      <rect x="100" y="225" width="280" height="14" rx="7"/>
      <rect x="100" y="257" width="280" height="14" rx="7"/>
    </g>

    <!-- Animated bars -->
    <rect x="100" y="65"  width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;246" dur="1.2s" begin="0.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="97"  width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;238" dur="1.2s" begin="0.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="129" width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;224" dur="1.2s" begin="0.6s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="161" width="0" height="14" rx="7" fill="url(#barM)">
      <animate attributeName="width" values="0;252" dur="1.2s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="193" width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;202" dur="1.2s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="225" width="0" height="14" rx="7" fill="url(#barC)">
      <animate attributeName="width" values="0;230" dur="1.2s" begin="1.2s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>
    <rect x="100" y="257" width="0" height="14" rx="7" fill="url(#barP)">
      <animate attributeName="width" values="0;258" dur="1.2s" begin="1.4s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </rect>

    <!-- Percentages -->
    <g font-family="'Fira Code',monospace" font-size="10" fill="#DDD6FE">
      <text x="354" y="76"> 88%</text>
      <text x="346" y="108">85%</text>
      <text x="332" y="140">80%</text>
      <text x="360" y="172">90%</text>
      <text x="310" y="204">72%</text>
      <text x="338" y="236">82%</text>
      <text x="366" y="268">92%</text>
    </g>

    <!-- Separator -->
    <line x1="460" y1="58" x2="460" y2="295" stroke="#A78BFA" stroke-opacity="0.15" stroke-width="1" stroke-dasharray="4 4"/>

    <!-- Right column: category chips -->
    <!-- Languages -->
    <text x="490" y="78"  font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">💻 LANGUAGES</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="86"  width="48" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="514" y="99"  text-anchor="middle">C++</text>
      <rect x="546" y="86"  width="58" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="575" y="99"  text-anchor="middle">Python</text>
      <rect x="612" y="86"  width="56" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="640" y="99"  text-anchor="middle">MATLAB</text>
      <rect x="676" y="86"  width="40" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="696" y="99"  text-anchor="middle">Julia</text>
    </g>

    <!-- Robotics -->
    <text x="490" y="132" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9" font-weight="600">🤖 ROBOTICS</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9">
      <rect x="490" y="140" width="52" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="516" y="153" text-anchor="middle">ROS 2</text>
      <rect x="550" y="140" width="66" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="583" y="153" text-anchor="middle">MoveIt 2</text>
      <rect x="624" y="140" width="44" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="646" y="153" text-anchor="middle">URDF</text>
      <rect x="676" y="140" width="36" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="694" y="153" text-anchor="middle">HIL</text>
    </g>

    <!-- Embedded -->
    <text x="490" y="186" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">🖥️ EMBEDDED</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="194" width="50" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="515" y="207" text-anchor="middle">ESP32</text>
      <rect x="548" y="194" width="50" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="573" y="207" text-anchor="middle">FPGA</text>
      <rect x="606" y="194" width="60" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="636" y="207" text-anchor="middle">Arduino</text>
      <rect x="674" y="194" width="38" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="693" y="207" text-anchor="middle">RPi</text>
    </g>

    <!-- CAD -->
    <text x="490" y="240" font-family="'Fira Code',monospace" font-size="11" fill="#67E8F9" font-weight="600">📐 CAD &amp; SIM</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#67E8F9">
      <rect x="490" y="248" width="84" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="532" y="261" text-anchor="middle">Fusion 360</text>
      <rect x="582" y="248" width="56" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="610" y="261" text-anchor="middle">ANSYS</text>
      <rect x="646" y="248" width="82" height="18" rx="9" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-opacity="0.5" stroke-width="1"/>
      <text x="687" y="261" text-anchor="middle">AutoCAD</text>
    </g>

    <!-- Control -->
    <text x="490" y="294" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" font-weight="600">⚙️ CONTROL</text>
    <g font-family="'Fira Code',monospace" font-size="10" fill="#C4B5FD">
      <rect x="490" y="302" width="74" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="527" y="315" text-anchor="middle">Simulink</text>
      <rect x="572" y="302" width="80" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="612" y="315" text-anchor="middle">Studio 5000</text>
      <rect x="660" y="302" width="38" height="18" rx="9" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-opacity="0.5" stroke-width="1"/>
      <text x="679" y="315" text-anchor="middle">PID</text>
    </g>
  </g>
</svg>
