<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a0a18"/>
      <stop offset="45%"  stop-color="#110820"/>
      <stop offset="100%" stop-color="#080f1a"/>
    </linearGradient>

    <!-- Energy gradient for lines/rings -->
    <linearGradient id="energyH" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="80%"  stop-color="#A78BFA" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="energyV" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="50%"  stop-color="#A78BFA" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>

    <!-- Radial for orbs -->
    <radialGradient id="orbP" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbC" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22D3EE" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbM" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#67E8F9"  stop-opacity="0"/>
    </radialGradient>

    <!-- Glow filters -->
    <filter id="gP" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gC" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gText" x="-10%" y="-30%" width="120%" height="160%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="gStrong" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <clipPath id="clip"><rect width="900" height="280"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <rect width="900" height="280" fill="url(#bg)"/>

    <!-- === BACKGROUND LAYER: Big orbs === -->
    <!-- Purple orb top-left -->
    <ellipse cx="80" cy="70" rx="140" ry="120" fill="url(#orbP)">
      <animate attributeName="rx" values="140;170;140" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="120;145;120" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.9;1;0.9" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Cyan orb bottom-right -->
    <ellipse cx="820" cy="220" rx="150" ry="120" fill="url(#orbC)">
      <animate attributeName="rx" values="150;180;150" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="120;148;120" dur="10s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.85;1;0.85" dur="10s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Mixed orb center-ish -->
    <ellipse cx="450" cy="140" rx="200" ry="80" fill="url(#orbM)">
      <animate attributeName="rx" values="200;240;200" dur="12s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.6;0.9;0.6" dur="12s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Small extra orbs -->
    <ellipse cx="820" cy="50"  rx="80" ry="70" fill="url(#orbP)" opacity="0.5">
      <animate attributeName="rx" values="80;96;80" dur="6s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="70"  cy="230" rx="90" ry="75" fill="url(#orbC)" opacity="0.45">
      <animate attributeName="ry" values="75;90;75" dur="7s" repeatCount="indefinite"/>
    </ellipse>

    <!-- === ENERGY LINES === -->
    <!-- Horizontal top -->
    <rect x="0" y="0" width="900" height="1.5" fill="url(#energyH)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </rect>
    <!-- Horizontal bottom -->
    <rect x="0" y="278" width="900" height="1.5" fill="url(#energyH)">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <!-- Vertical accent left -->
    <rect x="0" y="0" width="1.5" height="280" fill="url(#energyV)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- Vertical accent right -->
    <rect x="898" y="0" width="1.5" height="280" fill="url(#energyV)">
      <animate attributeName="opacity" values="0.3;0.8;0.3" dur="4s" begin="2s" repeatCount="indefinite"/>
    </rect>

    <!-- Diagonal subtle lines -->
    <line x1="0" y1="0" x2="180" y2="280" stroke="#A78BFA" stroke-width="0.5" stroke-opacity="0.08"/>
    <line x1="900" y1="0" x2="720" y2="280" stroke="#67E8F9" stroke-width="0.5" stroke-opacity="0.08"/>
    <line x1="0" y1="140" x2="900" y2="140" stroke="#A78BFA" stroke-width="0.4" stroke-opacity="0.06"/>

    <!-- === FLOATING PARTICLES — purple === -->
    <g filter="url(#gP)">
      <circle cx="200" cy="35"  r="2.5" fill="#A78BFA">
        <animate attributeName="cy"      values="35;18;35"     dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9"  dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="680" cy="248" r="2"   fill="#A78BFA">
        <animate attributeName="cy"      values="248;230;248"  dur="5.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.15;0.8" dur="5.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="440" cy="22"  r="3"   fill="#C4B5FD">
        <animate attributeName="cy"      values="22;7;22"      dur="5.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.25;1"     dur="5.8s" repeatCount="indefinite"/>
        <animate attributeName="r"       values="3;4;3"        dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="860" cy="145" r="2"   fill="#A78BFA">
        <animate attributeName="cx"      values="860;844;860"  dur="4.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="42"  cy="130" r="2.5" fill="#C4B5FD">
        <animate attributeName="cx"      values="42;58;42"     dur="5.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.18;0.8" dur="5.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="310" cy="262" r="2"   fill="#A78BFA">
        <animate attributeName="cy"      values="262;246;262"  dur="4.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.12;0.7" dur="4.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="130" cy="190" r="1.8" fill="#DDD6FE">
        <animate attributeName="cx"      values="130;145;130"  dur="6.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.1;0.6"  dur="6.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="770" cy="95"  r="2"   fill="#C4B5FD">
        <animate attributeName="cy"      values="95;80;95"     dur="3.9s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="3.9s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- === FLOATING PARTICLES — cyan === -->
    <g filter="url(#gC)">
      <circle cx="338" cy="252" r="2.5" fill="#67E8F9">
        <animate attributeName="cy"      values="252;235;252"  dur="4.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.25;1"     dur="4.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="600" cy="26"  r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="26;10;26"     dur="5.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9"  dur="5.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="760" cy="72"  r="3"   fill="#22D3EE">
        <animate attributeName="cy"      values="72;55;72"     dur="3.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.18;0.8" dur="3.7s" repeatCount="indefinite"/>
        <animate attributeName="r"       values="3;4.2;3"      dur="3.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="150" cy="200" r="2"   fill="#67E8F9">
        <animate attributeName="cx"      values="150;165;150"  dur="5.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="5.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="488" cy="268" r="2.5" fill="#22D3EE">
        <animate attributeName="cy"      values="268;252;268"  dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.2;0.9"  dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="50"  cy="55"  r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="55;40;55"     dur="5.6s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.75;0.15;0.75" dur="5.6s" repeatCount="indefinite"/>
      </circle>
      <circle cx="850" cy="255" r="1.8" fill="#22D3EE">
        <animate attributeName="cx"      values="850;836;850"  dur="4.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.12;0.7" dur="4.3s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- === ENERGY RINGS expanding from center === -->
    <circle cx="450" cy="140" r="0" fill="none" stroke="#A78BFA" stroke-width="1" opacity="0">
      <animate attributeName="r"       values="0;300"   dur="5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.3;0"   dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="450" cy="140" r="0" fill="none" stroke="#67E8F9" stroke-width="0.8" opacity="0">
      <animate attributeName="r"       values="0;300"   dur="5s" begin="2.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.25;0"  dur="5s" begin="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- === CENTRAL NAME CONTENT === -->
    <!-- Name -->
    <text x="450" y="118"
      font-family="'Segoe UI', 'Arial', sans-serif"
      font-size="40" font-weight="700" letter-spacing="1"
      fill="#EDE9FE" text-anchor="middle"
      filter="url(#gText)" opacity="0">
      Samuel David Sanchez Cardenas
      <animate attributeName="opacity" values="0;1" dur="0.8s" begin="0.3s" fill="freeze"/>
    </text>

    <!-- Animated underline -->
    <line x1="450" y1="131" x2="450" y2="131"
      stroke="url(#energyH)" stroke-width="1.5">
      <animate attributeName="x1" values="450;160" dur="0.8s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x2" values="450;740" dur="0.8s" begin="0.8s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </line>

    <!-- Subtitle -->
    <text x="450" y="162"
      font-family="'Fira Code', 'Courier New', monospace"
      font-size="14" fill="#A78BFA" text-anchor="middle" letter-spacing="1" opacity="0">
      Mechatronics Engineering  ·  UNAL  ·  Bogotá, Colombia
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="1.0s" fill="freeze"/>
    </text>

    <!-- Chips -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.3s" fill="freeze"/>
      <rect x="166" y="188" width="96" height="24" rx="12" fill="#7C3AED" fill-opacity="0.20" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="214" y="204" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">🤖 Robotics</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.5s" fill="freeze"/>
      <rect x="272" y="188" width="102" height="24" rx="12" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.6"/>
      <text x="323" y="204" font-family="'Fira Code',monospace" font-size="10.5" fill="#67E8F9" text-anchor="middle">🖥️ Embedded</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.7s" fill="freeze"/>
      <rect x="384" y="188" width="80" height="24" rx="12" fill="#7C3AED" fill-opacity="0.20" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="424" y="204" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">📐 CAD</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.9s" fill="freeze"/>
      <rect x="474" y="188" width="80" height="24" rx="12" fill="#0891B2" fill-opacity="0.18" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.6"/>
      <text x="514" y="204" font-family="'Fira Code',monospace" font-size="10.5" fill="#67E8F9" text-anchor="middle">🧠 AI / RL</text>
    </g>
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.1s" fill="freeze"/>
      <rect x="564" y="188" width="92" height="24" rx="12" fill="#7C3AED" fill-opacity="0.20" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.6"/>
      <text x="610" y="204" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">⚙️ Control</text>
    </g>

    <!-- GPA badge -->
    <g opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.4s" fill="freeze"/>
      <rect x="330" y="228" width="240" height="26" rx="5"
        fill="#0a0a18" fill-opacity="0.8" stroke="#7C3AED" stroke-width="1.2"/>
      <text x="450" y="245"
        font-family="'Fira Code',monospace" font-size="11"
        fill="#A78BFA" text-anchor="middle">
        ✦  GPA 4.6 / 5.0  ·  Merit Scholarship  ✦
      </text>
    </g>
  </g>
</svg>
