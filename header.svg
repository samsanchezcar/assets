<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1a"/>
      <stop offset="50%"  stop-color="#130820"/>
      <stop offset="100%" stop-color="#091520"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#A78BFA"/>
      <stop offset="50%"  stop-color="#67E8F9"/>
      <stop offset="75%"  stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="glowP">
      <feGaussianBlur stdDeviation="3.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowC">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glowText">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect width="900" height="300"/></clipPath>
  </defs>

  <g clip-path="url(#clip)">
    <!-- Background -->
    <rect width="900" height="300" fill="url(#bgGrad)"/>

    <!-- Grid -->
    <g stroke="#A78BFA" stroke-opacity="0.035" stroke-width="1">
      <line x1="0"   y1="60"  x2="900" y2="60"/>
      <line x1="0"   y1="120" x2="900" y2="120"/>
      <line x1="0"   y1="180" x2="900" y2="180"/>
      <line x1="0"   y1="240" x2="900" y2="240"/>
      <line x1="150" y1="0"   x2="150" y2="300"/>
      <line x1="300" y1="0"   x2="300" y2="300"/>
      <line x1="450" y1="0"   x2="450" y2="300"/>
      <line x1="600" y1="0"   x2="600" y2="300"/>
      <line x1="750" y1="0"   x2="750" y2="300"/>
    </g>

    <!-- Purple orbs -->
    <circle cx="100" cy="70"  r="90" fill="#7C3AED" opacity="0.10">
      <animate attributeName="r"       values="90;108;90"      dur="7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.10;0.17;0.10" dur="7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="800" cy="230" r="100" fill="#7C3AED" opacity="0.09">
      <animate attributeName="r"       values="100;118;100"    dur="9s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.09;0.15;0.09" dur="9s" repeatCount="indefinite"/>
    </circle>

    <!-- Cyan orbs -->
    <circle cx="840" cy="55"  r="70" fill="#22D3EE" opacity="0.09">
      <animate attributeName="r"       values="70;86;70"       dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.09;0.14;0.09" dur="6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="65"  cy="245" r="60" fill="#22D3EE" opacity="0.08">
      <animate attributeName="r"       values="60;74;60"       dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.08;0.13;0.08" dur="8s" repeatCount="indefinite"/>
    </circle>

    <!-- Purple particles -->
    <g filter="url(#glowP)">
      <circle cx="195" cy="38"  r="2.5" fill="#A78BFA">
        <animate attributeName="cy"      values="38;18;38"     dur="4.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.25;0.9" dur="4.2s" repeatCount="indefinite"/>
      </circle>
      <circle cx="710" cy="255" r="2"   fill="#A78BFA">
        <animate attributeName="cy"      values="255;237;255"  dur="5.1s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="5.1s" repeatCount="indefinite"/>
      </circle>
      <circle cx="445" cy="25"  r="3"   fill="#C4B5FD">
        <animate attributeName="cy"      values="25;8;25"      dur="5.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1"      dur="5.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="860" cy="150" r="2"   fill="#A78BFA">
        <animate attributeName="cx"      values="860;845;860"  dur="4.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7"  dur="4.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="45"  cy="140" r="2.5" fill="#C4B5FD">
        <animate attributeName="cx"      values="45;62;45"     dur="5.3s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="5.3s" repeatCount="indefinite"/>
      </circle>
      <circle cx="320" cy="270" r="2"   fill="#A78BFA">
        <animate attributeName="cy"      values="270;255;270"  dur="4.5s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.15;0.7" dur="4.5s" repeatCount="indefinite"/>
      </circle>
      <circle cx="580" cy="280" r="2.5" fill="#C4B5FD">
        <animate attributeName="cy"      values="280;263;280"  dur="6.2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="6.2s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Cyan particles -->
    <g filter="url(#glowC)">
      <circle cx="335" cy="258" r="2.5" fill="#67E8F9">
        <animate attributeName="cy"      values="258;240;258"  dur="4.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="1;0.3;1"      dur="4.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="605" cy="28"  r="2"   fill="#67E8F9">
        <animate attributeName="cy"      values="28;11;28"     dur="5.4s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.25;0.9" dur="5.4s" repeatCount="indefinite"/>
      </circle>
      <circle cx="768" cy="78"  r="3"   fill="#22D3EE">
        <animate attributeName="cy"      values="78;60;78"     dur="3.7s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.8;0.2;0.8"  dur="3.7s" repeatCount="indefinite"/>
      </circle>
      <circle cx="148" cy="205" r="2"   fill="#67E8F9">
        <animate attributeName="cx"      values="148;164;148"  dur="5.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.7;0.2;0.7"  dur="5.0s" repeatCount="indefinite"/>
      </circle>
      <circle cx="490" cy="272" r="2.5" fill="#22D3EE">
        <animate attributeName="cy"      values="272;256;272"  dur="4.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.9;0.25;0.9" dur="4.8s" repeatCount="indefinite"/>
      </circle>
      <circle cx="40"  cy="80"  r="2"   fill="#67E8F9">
        <animate attributeName="cx"      values="40;56;40"     dur="6.0s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values="0.6;0.15;0.6" dur="6.0s" repeatCount="indefinite"/>
      </circle>
    </g>

    <!-- Top + bottom accent lines -->
    <rect x="0" y="0"   width="900" height="2.5" fill="url(#accentLine)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="0" y="297" width="900" height="2.5" fill="url(#accentLine)">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>

    <!-- Name -->
    <text x="450" y="118"
      font-family="'Segoe UI',Arial,sans-serif"
      font-size="38" font-weight="700"
      fill="#E0D7FF" text-anchor="middle"
      letter-spacing="1.5"
      filter="url(#glowText)">
      Samuel David Sanchez Cardenas
      <animate attributeName="opacity" values="0;0;1" dur="1.4s" fill="freeze"/>
    </text>

    <!-- Underline expanding from center -->
    <line x1="450" y1="128" x2="450" y2="128" stroke="#67E8F9" stroke-width="1.5" stroke-opacity="0.6">
      <animate attributeName="x1" values="450;175" dur="0.9s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
      <animate attributeName="x2" values="450;725" dur="0.9s" begin="1.0s" fill="freeze" calcMode="spline" keySplines="0.4 0 0.2 1"/>
    </line>

    <!-- Subtitle -->
    <text x="450" y="158"
      font-family="'Fira Code','Courier New',monospace"
      font-size="14.5" fill="#A78BFA"
      text-anchor="middle" letter-spacing="0.8">
      Mechatronics Engineering  ·  UNAL  ·  Bogotá, Colombia
      <animate attributeName="opacity" values="0;0;1" dur="1s" begin="1.1s" fill="freeze"/>
    </text>

    <!-- Skill chips staggered -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.6s" fill="freeze"/>
      <rect x="172" y="182" width="96" height="24" rx="12" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.65"/>
      <text x="220" y="198" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">🤖 Robotics</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="1.8s" fill="freeze"/>
      <rect x="278" y="182" width="102" height="24" rx="12" fill="#0891B2" fill-opacity="0.20" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.65"/>
      <text x="329" y="198" font-family="'Fira Code',monospace" font-size="10.5" fill="#67E8F9" text-anchor="middle">🖥️ Embedded</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.0s" fill="freeze"/>
      <rect x="390" y="182" width="80"  height="24" rx="12" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.65"/>
      <text x="430" y="198" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">📐 CAD</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.2s" fill="freeze"/>
      <rect x="480" y="182" width="80"  height="24" rx="12" fill="#0891B2" fill-opacity="0.20" stroke="#67E8F9" stroke-width="1" stroke-opacity="0.65"/>
      <text x="520" y="198" font-family="'Fira Code',monospace" font-size="10.5" fill="#67E8F9" text-anchor="middle">🧠 AI / RL</text>
    </g>
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.5s" begin="2.4s" fill="freeze"/>
      <rect x="570" y="182" width="92"  height="24" rx="12" fill="#7C3AED" fill-opacity="0.22" stroke="#A78BFA" stroke-width="1" stroke-opacity="0.65"/>
      <text x="616" y="198" font-family="'Fira Code',monospace" font-size="10.5" fill="#C4B5FD" text-anchor="middle">⚙️ Control</text>
    </g>

    <!-- GPA badge -->
    <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.6s" begin="2.7s" fill="freeze"/>
      <rect x="328" y="222" width="244" height="26" rx="5" fill="#0d0d1a" stroke="#7C3AED" stroke-width="1.2"/>
      <text x="450" y="239" font-family="'Fira Code',monospace" font-size="11" fill="#A78BFA" text-anchor="middle">✦  GPA 4.6 / 5.0  ·  Merit Scholarship  ✦</text>
    </g>
  </g>
</svg>
